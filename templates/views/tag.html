{{ template "base.html" . }}

{{ define "head"}}
<title>标签 | {{ .Site.Title }}</title>
{{ end }}

{{ define "content" }}
<div class="tag-page">
    <p class="eyebrow">INDEX</p>
    <h1>标签索引</h1>
    <p class="page-lead">循着关键词，翻阅散落在不同时间里的记录。</p>
    <ul class="tag-list">
        {{range .list}}
        <li>
            <a href="/tag/{{.Tag}}">
                #{{.Tag}}
                <span class="tag-count">{{.Count}}</span>
            </a>
        </li>
        {{end}}
    </ul>
</div>
{{ end }}
