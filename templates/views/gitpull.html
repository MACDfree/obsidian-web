{{ template "base.html" . }}

{{ define "head"}}
<title>同步 | {{ .Site.Title }}</title>
{{ end }}

{{ define "content" }}
<div class="search">
    <h2 style="margin-bottom: 1rem;">Git 同步</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">{{ .GitStatus }}</p>
    <button type="button" onclick="gitpull()" style="margin-bottom: 1rem;">git pull</button>
    <pre id="out" style="background: var(--bg-secondary); padding: 1rem; border-radius: var(--radius-md); font-size: 0.85rem; min-height: 100px; overflow: auto;"></pre>
</div>

<script>
    function gitpull() {
        document.getElementById("out").innerText = "正在同步...";
        fetch("/gitpull", {
            method: "POST",
        }).then(res => res.json()).then(data => {
            document.getElementById("out").innerText = data.msg;
        }).catch(err => {
            document.getElementById("out").innerText = "请求失败: " + err.message;
        });
    }
</script>
{{ end }}
