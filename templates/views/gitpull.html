{{ template "base.html" . }}

{{ define "head"}}
<title>同步 | {{ .Site.Title }}</title>
{{ end }}

{{ define "content" }}
<div class="search">
    <p class="eyebrow">REPOSITORY</p>
    <h1>Git 同步</h1>
    <p class="page-lead">{{ .GitStatus }}</p>
    <button type="button" onclick="gitpull()">拉取最新笔记 →</button>
    <pre id="out" class="sync-output"></pre>
</div>

<script>
    function gitpull() {
        document.getElementById("out").innerText = "正在同步...";
        fetch("/gitpull", {
            method: "POST",
        }).then(res => res.json()).then(data => {
            document.getElementById("out").innerText = data.msg;
        }).catch(err => {
            document.getElementById("out").innerText = "请求失败: " + err.message;
        });
    }
</script>
{{ end }}
